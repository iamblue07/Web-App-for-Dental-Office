<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titlu %}Stomatologie{% endblock %} - Cabinet Stomatologic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">🦷 Cabinet Stomatologic</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{{ url_for('pacienti.lista') }}">Pacienți</a>
                <a class="nav-link" href="{{ url_for('medici.lista') }}">Medici</a>
                <a class="nav-link" href="{{ url_for('programari.lista') }}">Programări</a>
                <a class="nav-link" href="{{ url_for('programari.statistici') }}">Statistici</a>
                <a class="nav-link" href="{{ url_for('analiza.index') }}">📂 Analiză CSV</a>
            </div>
        </div>
    </nav>

    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block continut %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
